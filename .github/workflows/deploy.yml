name: Build & Push Docker Images
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show API context files
        run: ls -la Server/MagicStreamServer || true

      - name: Show Web context files
        run: ls -la Client/magic-stream-client || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            rosuelo996/magic-stream-api-prod
            rosuelo996/magic-stream-web-prod
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & Push API Image
        uses: docker/build-push-action@v6
        with:
          context: Server/MagicStreamServer
          file: Server/MagicStreamServer/Dockerfile.prod
          push: true
          tags: rosuelo996/magic-stream-api-prod:${{ steps.meta.outputs.version }}

      - name: Build & Push Web Image
        uses: docker/build-push-action@v6
        with:
          context: Client/magic-stream-client
          file: Client/magic-stream-client/Dockerfile.prod
          push: true
          tags: rosuelo996/magic-stream-web-prod:${{ steps.meta.outputs.version }}

      # - name: Setup SSH agent
